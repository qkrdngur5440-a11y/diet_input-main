name: CI

on:
  push:
    branches: 
      - main
      - feature/**
  pull_request:
    branches: 
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build and test input service
        run: mvn clean verify --batch-mode

      - name: Build and test analysis service
        run: mvn -f analysis/pom.xml clean verify --batch-mode

      - name: Build and test gateway service
        run: mvn -f gateway/pom.xml clean verify --batch-mode

      - name: Build and test eureka server
        run: mvn -f eureka/pom.xml clean verify --batch-mode

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/diet_input:${{ github.sha }} .
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/diet_input:${{ github.sha }} ${{ secrets.DOCKERHUB_USERNAME }}/diet_input:latest
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/diet_analysis:${{ github.sha }} analysis
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/diet_analysis:${{ github.sha }} ${{ secrets.DOCKERHUB_USERNAME }}/diet_analysis:latest
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/diet_gateway:${{ github.sha }} gateway
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/diet_gateway:${{ github.sha }} ${{ secrets.DOCKERHUB_USERNAME }}/diet_gateway:latest
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/diet_eureka:${{ github.sha }} eureka
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/diet_eureka:${{ github.sha }} ${{ secrets.DOCKERHUB_USERNAME }}/diet_eureka:latest

      - name: Login to Docker Hub
        if: github.event_name == 'push'  && github.ref == 'refs/heads/main'
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Push Docker image
        if: github.event_name == 'push'  && github.ref == 'refs/heads/main'
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/diet_input:${{ github.sha }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/diet_input:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/diet_analysis:${{ github.sha }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/diet_analysis:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/diet_gateway:${{ github.sha }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/diet_gateway:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/diet_eureka:${{ github.sha }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/diet_eureka:latest
  