name: Local CI/CD

on:
  push:
    branches:
      - main
      - feature/**
  workflow_dispatch:

jobs:
  build-and-deploy-local:
    runs-on: self-hosted

    env:
      KUSTOMIZE_OVERLAY: overlays/local

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show local tool versions
        shell: powershell
        run: |
          java -version
          docker --version
          kubectl version --client=true

      - name: Build input service
        shell: powershell
        run: .\mvnw.cmd clean verify --batch-mode

      - name: Build analysis service
        shell: powershell
        run: .\mvnw.cmd -f analysis\pom.xml clean verify --batch-mode

      - name: Build gateway service
        shell: powershell
        run: .\mvnw.cmd -f gateway\pom.xml clean verify --batch-mode

      - name: Build eureka server
        shell: powershell
        run: .\mvnw.cmd -f eureka\pom.xml clean verify --batch-mode

      - name: Build local Docker images  
        shell: powershell
        run: |
          docker build -t diet_input:local .
          docker build -t diet_analysis:local analysis
          docker build -t diet_gateway:local gateway
          docker build -t diet_eureka:local eureka

      - name: Deploy to local Kubernetes
        shell: powershell
        run: kubectl apply -k $env:KUSTOMIZE_OVERLAY

      - name: Check rollout status
        shell: powershell
        run: |
          kubectl rollout status deployment/input-service -n book-dev --timeout=120s
          kubectl rollout status deployment/diet-analysis-service -n book-dev --timeout=120s
          kubectl rollout status deployment/diet-gateway-service -n book-dev --timeout=120s
          kubectl rollout status deployment/diet-eureka-server -n book-dev --timeout=120s

      - name: Show services
        shell: powershell
        run: kubectl get svc -n book-dev
